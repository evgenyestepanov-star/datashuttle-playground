# kind cluster config for DataShuttle ClickHouse demo.
# 1 control-plane + 3 workers to spread DataShuttle pods.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ds-clickhouse
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # DataShuttle API — access from host via localhost:8080
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # MinIO console — access from host via localhost:9001
      - containerPort: 30901
        hostPort: 9001
        protocol: TCP
      # ClickHouse HTTP — access from host via localhost:8123
      - containerPort: 30123
        hostPort: 8123
        protocol: TCP
  - role: worker
  - role: worker
  - role: worker
