name: Acceptance Tests

# Nightly + manual run of the playground acceptance suite.
# Each scenario brings up its full compose stack, runs demo.sh up,
# waits for the API, runs verify.sh, captures artifacts, tears down.
#
# This is the contract that says "the released product works for a
# user running the documented scenarios". Distinct from per-crate
# integration tests (those live in the source repos) and unit tests.

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'OSS image to test (default: ghcr.io/datashuttle-io/datashuttle:latest)'
        required: false
        default: 'ghcr.io/datashuttle-io/datashuttle:latest'
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC — after the datashuttle integration suite
  push:
    branches: [main]
    paths:
      - 'acceptance/**'
      - 'examples/**'
      - '.github/workflows/acceptance.yaml'

permissions:
  contents: read

concurrency:
  group: acceptance-${{ github.event_name == 'push' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  acceptance:
    name: Acceptance — all scenarios
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 90
    env:
      DATASHUTTLE_IMAGE: ${{ github.event.inputs.image || 'ghcr.io/datashuttle-io/datashuttle:latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to ghcr (read-only)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image under test
        run: docker pull "$DATASHUTTLE_IMAGE"

      - name: Run all acceptance wrappers
        run: ./acceptance/run_all.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-artifacts
          path: acceptance/artifacts/
          if-no-files-found: ignore
