[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
    "CC0-1.0",
]
confidence-threshold = 0.8

[advisories]
yanked = "warn"
ignore = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
